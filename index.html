<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TUSAŞ 3D - GÖREVİMİZ TÜRKİYE</title>
    <style>
        body { margin: 0; background: #060810; color: white; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        button { padding: 15px 30px; cursor: pointer; background: #e30613; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui"><h2>TUSAŞ - GÖREVİMİZ TÜRKİYE</h2><p id="score">Skor: 0</p></div>
    <div id="menu">
        <button onclick="startGame()">KAAN TFX ile Oyuna Başla</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
